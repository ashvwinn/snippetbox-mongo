{{define "title"}}My Snippets{{end}}

{{define "main"}}
    <h2>My Snippets</h2>
    {{if .Snippets}}
        <table>
            <tr>
                <th>Title</th>
                <th>Created</th>
                <th>ID</th>
            </tr>
        {{range .Snippets}}
            <tr>
                <td><a href="/snippet/view/{{.ID.Hex}}">{{.Title}}</a></td>
                <td>{{humanDate .Created}}</td>
                <td>#{{.ID.Hex}}</td>
            </tr>
        {{end}}
        </table>
    {{else}}
        <p>There's nothing to see here yet!</p>
    {{end}}
{{end}}
